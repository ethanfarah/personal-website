<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>farah.fyi — under construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Newsreader:ital,wght@0,400;1,400&display=swap" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #f4efe6;
      color: #0a0a0a;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      text-align: center;
      max-width: 36rem;
    }
    h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #7c2d12;
    }
    p {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2rem;
      opacity: 0.55;
    }
    .cursor {
      display: inline-block;
      width: 0.5ch;
      background: #7c2d12;
      animation: blink 1.1s steps(2) infinite;
      margin-left: 0.15em;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main>
    <h1>under construction<span class="cursor">&nbsp;</span></h1>
    <p>farah.fyi &middot; back soon</p>
  </main>
